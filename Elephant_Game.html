<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elephant Dodge</title>
    <style>
        body {
            background-color: #2d5a1b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
 
        h2 {
            color: #f0e68c;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
 
        canvas {
            display: block;
            border: 3px solid #5a8a3c;
            border-radius: 8px;
            cursor: none;
        }
 
        #ui {
            display: flex;
            justify-content: space-between;
            width: 800px;
            max-width: 100%;
            padding: 8px 4px;
            color: #f0e68c;
            font-size: 15px;
        }
 
        #statusMsg {
            color: #cce8aa;
        }
    </style>
</head>
<body>
 
    <h2>🐘 Elephant Dodge</h2>
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="ui">
        <span>Score: <strong id="scoreDisplay">0</strong></span>
        <span id="statusMsg">Use arrow keys or WASD to move</span>
        <span>High Score: <strong id="highDisplay">0</strong></span>
    </div>
 
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
 
        let player, elephants, score, highScore, gameOver, animId, spawnTimer, difficulty, particles;
 
        function init() {
            player = {x: W/2, y: H*0.75, w: 22, h: 30, speed: 4, dx: 0, dy: 0};
            elephants = [];
            particles = [];
            score = 0;
            gameOver = false;
            spawnTimer = 0;
            difficulty = 1;
            if (!highScore) highScore = 0;
            document.getElementById('statusMsg').textContent = 'Use arrow keys or WASD to move';
            loop();
        }
 
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
            if (gameOver && (e.key === 'Enter' || e.key === ' ')) init();
        });
        window.addEventListener('keyup', e => keys[e.key] = false);
        canvas.addEventListener('click', () => { if (gameOver) init(); });
 
        function spawnElephant() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = Math.random() * W; y = -80; }
            else if (side === 1) { x = W + 80; y = Math.random() * H; }
            else if (side === 2) { x = Math.random() * W; y = H + 80; }
            else { x = -80; y = Math.random() * H; }
            const angle = Math.atan2(player.y - y, player.x - x);
            const spd = 2.2 + difficulty * 0.3 + Math.random() * 0.8;
            elephants.push({x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, w: 64, h: 48, angle, wobble: Math.random()*Math.PI*2});
        }
 
        function drawGrass() {
            ctx.fillStyle = '#5a9e3a';
            ctx.fillRect(0, 0, W, H);
            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = '#4e8f32';
                ctx.fillRect(i * (W/30), 0, W/60, H);
            }
            for (let i = 0; i < 60; i++) {
                ctx.fillStyle = '#63ad42';
                ctx.fillRect(i * (W/60) + 2, 0, 3, H);
            }
        }
 
        function drawPlayer(p) {
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.fillStyle = '#e8c87a';
            ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
            ctx.fillStyle = '#c9a94a';
            ctx.fillRect(-p.w/2, -p.h/2, p.w, 8);
            ctx.fillStyle = '#b5884a';
            ctx.fillRect(-6, p.h/2 - 2, 5, 8);
            ctx.fillRect(1, p.h/2 - 2, 5, 8);
            ctx.fillStyle = '#e8c87a';
            ctx.beginPath();
            ctx.arc(0, -p.h/2 - 6, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(-3, -p.h/2 - 8, 2, 0, Math.PI*2);
            ctx.arc(3, -p.h/2 - 8, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
 
        function drawElephant(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            ctx.rotate(e.angle + Math.PI/2);
            const w = e.wobble;
            ctx.fillStyle = '#7a7a8a';
            ctx.beginPath();
            ctx.ellipse(0, 0, 28, 22, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#6a6a7a';
            ctx.beginPath();
            ctx.ellipse(0, -28, 18, 16, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#6a6a7a';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(0, -40);
            ctx.quadraticCurveTo(12 + Math.sin(w)*3, -52, 8 + Math.sin(w)*2, -62);
            ctx.stroke();
            ctx.fillStyle = '#7a7a8a';
            ctx.beginPath();
            ctx.ellipse(-12, 14 + Math.sin(w+0.5)*2, 7, 14, -0.2, 0, Math.PI*2);
            ctx.ellipse(12, 14 + Math.sin(w+1.5)*2, 7, 14, 0.2, 0, Math.PI*2);
            ctx.ellipse(-10, -8 + Math.sin(w)*2, 7, 13, -0.1, 0, Math.PI*2);
            ctx.ellipse(10, -8 + Math.sin(w+1)*2, 7, 13, 0.1, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#c8a0a0';
            ctx.beginPath();
            ctx.ellipse(-18, -22, 8, 12, -0.4, 0, Math.PI*2);
            ctx.ellipse(18, -22, 8, 12, 0.4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(-5, -32, 3, 0, Math.PI*2);
            ctx.arc(5, -32, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
 
        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            });
        }
 
        function drawHUD() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('highDisplay').textContent = highScore;
            const lvl = Math.floor(difficulty);
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(8, 8, 80, 22);
            ctx.fillStyle = '#fff';
            ctx.font = '13px Arial';
            ctx.fillText('Level ' + lvl, 16, 24);
        }
 
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 42px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', W/2, H/2 - 30);
            ctx.font = '22px Arial';
            ctx.fillText('Score: ' + score, W/2, H/2 + 10);
            ctx.font = '16px Arial';
            ctx.fillStyle = '#ddd';
            ctx.fillText('Press Enter, Space, or click to restart', W/2, H/2 + 50);
            ctx.textAlign = 'left';
        }
 
        function collides(a, b) {
            return Math.abs(a.x - b.x) < (a.w/2 + b.w/2 - 8) &&
                   Math.abs(a.y - b.y) < (a.h/2 + b.h/2 - 8);
        }
 
        function loop() {
            if (gameOver) return;
            animId = requestAnimationFrame(loop);
            ctx.clearRect(0, 0, W, H);
            drawGrass();
 
            player.dx = 0; player.dy = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.dx = -player.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.dx = player.speed;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) player.dy = -player.speed;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) player.dy = player.speed;
 
            player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x + player.dx));
            player.y = Math.max(player.h/2, Math.min(H - player.h/2, player.y + player.dy));
 
            spawnTimer++;
            const spawnRate = Math.max(45, 120 - difficulty * 15);
            if (spawnTimer >= spawnRate) { spawnElephant(); spawnTimer = 0; }
 
            score++;
            difficulty = 1 + score / 600;
 
            elephants.forEach(e => {
                e.x += e.vx;
                e.y += e.vy;
                e.wobble += 0.15;
                const spd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
                const ang = Math.atan2(player.y - e.y, player.x - e.x);
                const turn = 0.015;
                e.vx += Math.cos(ang) * turn;
                e.vy += Math.sin(ang) * turn;
                const len = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
                e.vx = e.vx / len * spd;
                e.vy = e.vy / len * spd;
                e.angle = Math.atan2(e.vy, e.vx);
                if (Math.random() < 0.3) particles.push({
                    x: e.x + Math.random()*20 - 10,
                    y: e.y + Math.random()*20 - 10,
                    r: 4 + Math.random()*4,
                    life: 0.7,
                    color: '#7a6040',
                    vx: (Math.random()-0.5)*1.5,
                    vy: (Math.random()-0.5)*1.5
                });
            });
 
            elephants = elephants.filter(e => e.x > -150 && e.x < W+150 && e.y > -150 && e.y < H+150);
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.04; });
            particles = particles.filter(p => p.life > 0);
 
            drawParticles();
            elephants.forEach(drawElephant);
            drawPlayer(player);
            drawHUD();
 
            for (let e of elephants) {
                if (collides(player, e)) {
                    gameOver = true;
                    cancelAnimationFrame(animId);
                    if (score > highScore) highScore = score;
                    document.getElementById('statusMsg').textContent = 'Click or press Enter to restart';
                    drawGameOver();
                    return;
                }
            }
        }
 
        init();
    </script>
 
</body>
</html>
